name: CI Pipeline

on:
  push:
    branches:
      - master  # или ветка, на которую ты хочешь запускать тесты

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '16'  # или другая версия, если нужно

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npx playwright test --reporter=allure-playwright

    - name: Copy Allure data
      run: |
        if [ -d "allure-results" ]; then
          mkdir -p allure-results-previous
          cp -r allure-results/* allure-results-previous/
        fi

    - name: Generate Allure report
      run: npx allure generate allure-results --clean -o allure-report

    - name: Push Allure report to `gh-pages` branch
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "Redmine"
        git config --global user.email "redmine@github.com"
        git checkout --orphan gh-pages
        git rm -rf .
        cp -r allure-report/* .
        git add .
        git commit -m "Update Allure report"
        git push origin gh-pages --force

    - name: Deploy to GitHub Pages
      run: |
        echo "GitHub Pages deployed to gh-pages branch"
